version: '3.8'

services:
  # ---------------------------------------------------------------
  # FastAPI backend (FOHEM ML routers)
  # ---------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.ml
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app/backend
      - ./multisow:/app/multisow
      - app-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - MULTISOW_DATABASE_URL=postgresql+asyncpg://multisow:multisow-pass@postgres:5432/multisow_db
      - MULTISOW_INFLUXDB_URL=http://influxdb:8086
      - MULTISOW_INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-multisow-dev-token}
      - MULTISOW_INFLUXDB_ORG=multisow
      - MULTISOW_INFLUXDB_BUCKET=sensor_data
      - MULTISOW_REDIS_URL=redis://redis:6379/0
      - MULTISOW_MLFLOW_TRACKING_URI=http://mlflow:5000
      - MULTISOW_ENVIRONMENT=production
      - MULTISOW_FOHEM_BOOTSTRAP_ON_STARTUP=true
      - CORS_ORIGINS=http://localhost:3001,http://frontend:3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - BACKEND_URL=http://web:8001
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------
  # One-shot FOHEM training service (run with: docker compose run train)
  # ---------------------------------------------------------------
  train:
    build:
      context: .
      dockerfile: Dockerfile.ml
    command: >
      python -m multisow.ml.pipelines.train
        --epochs 50
        --output /app/data/models
    volumes:
      - ./multisow:/app/multisow
      - app-data:/app/data
    environment:
      - MULTISOW_DATABASE_URL=postgresql+asyncpg://multisow:multisow-pass@postgres:5432/multisow_db
      - MULTISOW_MLFLOW_TRACKING_URI=http://mlflow:5000
    profiles:
      - tools

  # ---------------------------------------------------------------
  # arq background worker (ML training, async tasks)
  # ---------------------------------------------------------------
  arq_worker:
    build:
      context: .
      dockerfile: Dockerfile.ml
    command: arq backend.worker.WorkerSettings
    volumes:
      - ./backend:/app/backend
      - ./multisow:/app/multisow
      - app-data:/app/data
    environment:
      - MULTISOW_DATABASE_URL=postgresql+asyncpg://multisow:multisow-pass@postgres:5432/multisow_db
      - MULTISOW_REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------
  # PostgreSQL 17 (primary relational database)
  # ---------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=multisow
      - POSTGRES_PASSWORD=multisow-pass
      - POSTGRES_DB=multisow_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multisow -d multisow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  # InfluxDB 2.x (IoT sensor time-series)
  # ---------------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=multisow-password
      - DOCKER_INFLUXDB_INIT_ORG=multisow
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-multisow-dev-token}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  # Redis (arq broker + cache)
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------
  # MLflow tracking server (optional — remove to save resources)
  # ---------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    restart: unless-stopped

volumes:
  app-data:
  postgres-data:
  influxdb-data:
  redis-data:
  mlflow-data:
